<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <title>Threads Callback</title>
    <style>
      :root {
        color-scheme: light;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #f8fafc;
        color: #0f172a;
        display: grid;
        place-items: center;
      }

      main {
        width: min(680px, calc(100vw - 32px));
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        background: #ffffff;
        padding: 32px;
        box-shadow: 0 1px 2px rgb(15 23 42 / 0.06);
      }

      h1 {
        margin: 0;
        font-size: clamp(28px, 4vw, 40px);
        line-height: 1.15;
      }

      p {
        margin: 16px 0 0;
        color: #475569;
        line-height: 1.7;
      }

      code {
        display: block;
        margin-top: 16px;
        overflow-wrap: anywhere;
        border-radius: 6px;
        background: #0f172a;
        color: #f8fafc;
        padding: 14px;
        line-height: 1.6;
      }

      .muted {
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Threads Callback</h1>
      <p id="message">Callback endpoint is active.</p>
      <code id="code" hidden></code>
      <p class="muted">This standalone page is intentionally hidden from GoodStuff navigation and search indexes.</p>
    </main>
    <script>
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      const error = params.get('error');
      const message = document.getElementById('message');
      const codeBlock = document.getElementById('code');

      if (code) {
        message.textContent = 'Authorization code received.';
        codeBlock.hidden = false;
        codeBlock.textContent = code;
      } else if (error) {
        message.textContent = `Callback returned an error: ${error}`;
      }
    </script>
  </body>
</html>
