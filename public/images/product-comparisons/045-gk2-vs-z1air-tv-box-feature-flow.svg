  <text x="118" y="268" font-size="28" font-weight="700" fill="#0f172a">選 A 前確認</text>
<text x="118" y="326" font-size="28" font-weight="700" fill="#0f172a">處理器、記憶體、系統版本、遙控器與正版串流支援</text>
<text x="118" y="384" font-size="28" font-weight="700" fill="#0f172a">主要限制</text>
<text x="118" y="442" font-size="28" font-weight="700" fill="#0f172a">畫質宣稱不等於 Netflix/串流認證，需查 DRM 與 app 相容</text>
  <text x="818" y="268" font-size="28" font-weight="700" fill="#0f172a">選 B 前確認</text>
<text x="818" y="326" font-size="28" font-weight="700" fill="#0f172a">Google Play、HDMI、Wi-Fi、遙控器、保固與串流認證</text>
