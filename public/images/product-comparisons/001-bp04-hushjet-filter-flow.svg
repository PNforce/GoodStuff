<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="675" viewBox="0 0 1400 675" role="img" aria-labelledby="title desc">
  <title id="title">Dyson BP04 與 Dyson HushJet 濾網與氣流比較示意圖</title>
  <desc id="desc">自製插圖，比較 BP04 的 HEPA、K-Carbon、SCO 濾網與 HushJet 的 360 度靜電濾網、活性碳濾網。</desc>
  <rect width="1400" height="675" fill="#fbfcf7"/>
  <text x="700" y="70" text-anchor="middle" font-family="Arial, 'Noto Sans TC', sans-serif" font-size="38" font-weight="700" fill="#19364d">濾網與氣流：功能差異不是只有大小</text>
  <g transform="translate(90 126)">
    <rect width="480" height="445" rx="28" fill="#ffffff" stroke="#d5dde5"/>
    <text x="240" y="54" text-anchor="middle" font-family="Arial, 'Noto Sans TC', sans-serif" font-size="30" font-weight="700" fill="#1f4d72">BP04</text>
    <text x="240" y="88" text-anchor="middle" font-family="Arial, 'Noto Sans TC', sans-serif" font-size="18" fill="#61727f">大濾網系統與長距離送風</text>
    <circle cx="240" cy="238" r="115" fill="#f0f6fa" stroke="#8aa7bc" stroke-width="8"/>
    <circle cx="240" cy="238" r="82" fill="#fff7d9" stroke="#d5ad43" stroke-width="7"/>
    <circle cx="240" cy="238" r="48" fill="#e7f4eb" stroke="#6fa878" stroke-width="7"/>
    <text x="240" y="213" text-anchor="middle" font-family="Arial, 'Noto Sans TC', sans-serif" font-size="21" font-weight="700" fill="#1e3d50">HEPA H13</text>
    <text x="240" y="243" text-anchor="middle" font-family="Arial, 'Noto Sans TC', sans-serif" font-size="18" fill="#1e3d50">K-Carbon</text>
    <text x="240" y="273" text-anchor="middle" font-family="Arial, 'Noto Sans TC', sans-serif" font-size="18" fill="#1e3d50">SCO</text>
    <path d="M72 394 C150 338, 330 338, 408 394" fill="none" stroke="#75b6d5" stroke-width="12" stroke-linecap="round" opacity="0.7"/>
    <text x="240" y="425" text-anchor="middle" font-family="Arial, 'Noto Sans TC', sans-serif" font-size="20" fill="#334e5f">適合長時間處理大空間複合污染</text>
  </g>
  <g transform="translate(830 126)">
    <rect width="480" height="445" rx="28" fill="#ffffff" stroke="#d5dde5"/>
    <text x="240" y="54" text-anchor="middle" font-family="Arial, 'Noto Sans TC', sans-serif" font-size="30" font-weight="700" fill="#1f4d72">HushJet HJ10</text>
    <text x="240" y="88" text-anchor="middle" font-family="Arial, 'Noto Sans TC', sans-serif" font-size="18" fill="#61727f">小型濾網與安靜維持空氣品質</text>
    <rect x="176" y="134" width="128" height="210" rx="64" fill="#eef7f8" stroke="#7aa9b5" stroke-width="8"/>
    <rect x="199" y="164" width="82" height="150" rx="41" fill="#f8fbfd" stroke="#64b8ca" stroke-width="6"/>
    <circle cx="240" cy="239" r="32" fill="#fff4d5" stroke="#d2a848" stroke-width="6"/>
    <text x="240" y="223" text-anchor="middle" font-family="Arial, 'Noto Sans TC', sans-serif" font-size="18" font-weight="700" fill="#1e3d50">靜電</text>
    <text x="240" y="249" text-anchor="middle" font-family="Arial, 'Noto Sans TC', sans-serif" font-size="18" fill="#1e3d50">碳濾</text>
    <path d="M126 390 C188 350, 292 350, 354 390" fill="none" stroke="#7fd0d8" stroke-width="10" stroke-linecap="round" opacity="0.74"/>
    <text x="240" y="425" text-anchor="middle" font-family="Arial, 'Noto Sans TC', sans-serif" font-size="20" fill="#334e5f">適合房間、書房、床邊低噪使用</text>
  </g>
  <text x="700" y="626" text-anchor="middle" font-family="Arial, 'Noto Sans TC', sans-serif" font-size="19" fill="#687983">自製資訊圖；依 Dyson 官方濾網說明、RTINGS 測試與公開評測整理。</text>
</svg>
