  <text x="118" y="268" font-size="28" font-weight="700" fill="#0f172a">Brita 通用活性炭濾芯</text>
<text x="118" y="326" font-size="28" font-weight="700" fill="#0f172a">約 NT$55</text>
<text x="118" y="384" font-size="28" font-weight="700" fill="#0f172a">約 20萬+</text>
<text x="118" y="442" font-size="28" font-weight="700" fill="#0f172a">已知道自家濾水壺規格且想壓低耗材成本的人</text>
