<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">綠綠好日小米濾網 vs 怡悅 HEPA 濾芯：RFID 相容款與高銷量台灣製怎麼選 空間、需求、功能與成本比較圖</title>
  <desc id="desc">Shopee 商品頁與公開查核資料整理的兩款產品比較圖。</desc>
  <rect width="1400" height="760" fill="#f8fafc"/>
  <rect x="60" y="58" width="1280" height="94" rx="22" fill="#0f172a"/>
  <text x="92" y="118" font-size="36" font-weight="700" fill="#ffffff">綠綠好日小米濾網 vs 怡悅 HEPA 濾芯：RFID 相容款與高銷量台灣製怎麼選</text>
  <rect x="80" y="198" width="540" height="430" rx="26" fill="#ffffff" stroke="#cbd5e1" stroke-width="3"/>
  <rect x="780" y="198" width="540" height="430" rx="26" fill="#ffffff" stroke="#cbd5e1" stroke-width="3"/>
  <rect x="650" y="250" width="100" height="326" rx="28" fill="#e2e8f0"/>
  <text x="681" y="420" font-size="34" font-weight="800" fill="#334155">VS</text>
  <text x="118" y="268" font-size="28" font-weight="700" fill="#0f172a">選 A 前確認</text>
<text x="118" y="326" font-size="28" font-weight="700" fill="#0f172a">確認小米 1/2/2S/Pro/3 代相容性、RFID、濾網方向與更換提醒</text>
<text x="118" y="384" font-size="28" font-weight="700" fill="#0f172a">主要限制</text>
<text x="118" y="442" font-size="28" font-weight="700" fill="#0f172a">相容機型和 RFID 實際支援要逐一確認</text>
  <text x="818" y="268" font-size="28" font-weight="700" fill="#0f172a">選 B 前確認</text>
<text x="818" y="326" font-size="28" font-weight="700" fill="#0f172a">確認濾芯高度、機型版本、HEPA 等級標示、是否含活性碳與保固</text>
<text x="818" y="384" font-size="28" font-weight="700" fill="#0f172a">主要限制</text>
<text x="818" y="442" font-size="28" font-weight="700" fill="#0f172a">價格略高，是否含活性碳或 RFID 要看版本</text>
  <rect x="210" y="660" width="980" height="46" rx="23" fill="#e2e8f0"/>
  <text x="248" y="691" font-size="22" font-weight="650" fill="#334155">需求判斷 / 小米空氣清淨機耗材更換、租屋空氣品質、寵物氣味、灰塵與濾芯成本控制 / 價格、功能與維護一起看</text>
  <text x="94" y="724" font-size="18" fill="#64748b">資料來源：Shopee 商品頁、官方/公開查核資料；價格、銷量與庫存會變動。</text>
</svg>
