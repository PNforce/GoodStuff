<text x="818" y="326" font-size="28" font-weight="700" fill="#0f172a">約 NT$108</text>
<text x="818" y="384" font-size="28" font-weight="700" fill="#0f172a">約 20萬+</text>
<text x="818" y="442" font-size="28" font-weight="700" fill="#0f172a">需要便宜、明確、基本安全防護的居家延長線</text>
  <rect x="210" y="660" width="980" height="46" rx="23" fill="#e2e8f0"/>
  <text x="248" y="691" font-size="22" font-weight="650" fill="#334155">新安規延長線 / 比較重點 / 宏晉款偏向 4 孔加 3USB 的桌面整合，iLife 款偏向台灣製、高銷量與獨立開關延長線。</text>
  <text x="94" y="724" font-size="18" fill="#64748b">資料來源：Shopee 商品頁、官方/公開查核資料；價格、銷量與庫存會變動。</text>
