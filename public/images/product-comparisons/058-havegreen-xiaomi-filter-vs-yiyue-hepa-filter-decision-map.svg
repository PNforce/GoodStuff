<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">綠綠好日小米濾網 vs 怡悅 HEPA 濾芯：RFID 相容款與高銷量台灣製怎麼選 空間定位、價格比較圖</title>
  <desc id="desc">Shopee 商品頁與公開查核資料整理的兩款產品比較圖。</desc>
  <rect width="1400" height="760" fill="#f8fafc"/>
  <rect x="60" y="58" width="1280" height="94" rx="22" fill="#0f172a"/>
  <text x="92" y="118" font-size="36" font-weight="700" fill="#ffffff">綠綠好日小米濾網 vs 怡悅 HEPA 濾芯：RFID 相容款與高銷量台灣製怎麼選</text>
  <rect x="80" y="198" width="540" height="430" rx="26" fill="#ffffff" stroke="#cbd5e1" stroke-width="3"/>
  <rect x="780" y="198" width="540" height="430" rx="26" fill="#ffffff" stroke="#cbd5e1" stroke-width="3"/>
  <rect x="650" y="250" width="100" height="326" rx="28" fill="#e2e8f0"/>
  <text x="681" y="420" font-size="34" font-weight="800" fill="#334155">VS</text>
  <text x="118" y="268" font-size="28" font-weight="700" fill="#0f172a">綠綠好日小米濾網</text>
<text x="118" y="326" font-size="28" font-weight="700" fill="#0f172a">約 NT$229</text>
<text x="118" y="384" font-size="28" font-weight="700" fill="#0f172a">約 4萬+</text>
<text x="118" y="442" font-size="28" font-weight="700" fill="#0f172a">希望濾網替換後能維持機器辨識與除味訴求的人</text>
  <text x="818" y="268" font-size="28" font-weight="700" fill="#0f172a">怡悅 HEPA 濾芯</text>
<text x="818" y="326" font-size="28" font-weight="700" fill="#0f172a">約 NT$285</text>
<text x="818" y="384" font-size="28" font-weight="700" fill="#0f172a">約 10萬+</text>
<text x="818" y="442" font-size="28" font-weight="700" fill="#0f172a">重視銷量評價、台灣製與長期耗材補貨穩定的人</text>
  <rect x="210" y="660" width="980" height="46" rx="23" fill="#e2e8f0"/>
  <text x="248" y="691" font-size="22" font-weight="650" fill="#334155">小米空氣清淨機濾網 / 比較重點 / 綠綠好日款強調含 RFID 與活性碳除臭，怡悅款強調台灣製、高銷量與抗菌 HEPA 相容濾芯。</text>
  <text x="94" y="724" font-size="18" fill="#64748b">資料來源：Shopee 商品頁、官方/公開查核資料；價格、銷量與庫存會變動。</text>
