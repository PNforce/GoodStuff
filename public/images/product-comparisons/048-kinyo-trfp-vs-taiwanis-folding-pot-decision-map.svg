  <text x="248" y="691" font-size="22" font-weight="650" fill="#334155">旅行電煮鍋 / 比較重點 / KINYO TRFP 偏品牌旗艦與 0.9L 小容量，Taiwanis 偏寬電壓、折疊與價格較低。</text>
