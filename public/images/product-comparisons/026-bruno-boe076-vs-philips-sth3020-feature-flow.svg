<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="720" viewBox="0 0 1400 720" role="img" aria-labelledby="title desc">
  <title id="title">BRUNO BOE076 vs Philips STH3020：美型掛燙機與折疊旅行款怎麼選：功能取捨流程</title>
  <desc id="desc">比較圖，依公開商品頁、官方資料與選購查核重點整理。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef7f4"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#17324d" flood-opacity="0.16"/>
    </filter>
  </defs>
  <style>
    .title { font: 700 34px "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif; fill: #17324d; }
    .small { font: 500 20px "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif; fill: #48667d; }
    .label { font: 700 28px "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif; fill: #17324d; }
    .body { font: 500 22px "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif; fill: #25445f; }
    .pill { font: 700 20px "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif; fill: #ffffff; }
  </style>
  <rect width="1400" height="720" fill="url(#bg)"/>
  <text x="64" y="70" class="title">BRUNO BOE076 vs Philips STH3020：美型掛燙機與</text>
  <text x="66" y="112" class="small">手持蒸氣掛燙機｜功能取捨流程｜2026-05-22</text>
  <rect x="68" y="155" width="492" height="430" rx="20" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="840" y="155" width="492" height="430" rx="20" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="96" y="185" width="160" height="42" rx="21" fill="#2f7da1"/>
  <rect x="868" y="185" width="160" height="42" rx="21" fill="#4f8b5f"/>
  <text x="116" y="214" class="pill">方案 A</text>
  <text x="888" y="214" class="pill">方案 B</text>
  <text x="96" y="270" class="label">BRUNO BOE076</text>
  <text x="868" y="270" class="label">Philips STH3020</text>
  <text x="96" y="326" class="body">適合：</text>
  <text x="96" y="362" class="body">你重視外型、居家擺放與品牌風格，</text>
  <text x="96" y="398" class="body">使用量是每天一兩件衣物快速整理。</text>
  <text x="96" y="434" class="body">它不是最低價，但比較像願意被看見的生活家電。</text>
  <text x="96" y="470" class="body">下單前檢查：</text>
  <text x="96" y="506" class="body">水箱容量、重量、蒸氣時間、BSMI與保固</text>
  <text x="868" y="326" class="body">適合：</text>
  <text x="868" y="362" class="body">你重視價格、折疊收納、</text>
  <text x="868" y="398" class="body">旅行攜帶與官方功能資料。它適合租屋、</text>
  <text x="868" y="434" class="body">出差與功能優先的人。</text>
  <text x="868" y="470" class="body">下單前檢查：</text>
  <text x="868" y="506" class="body">水箱容量、預熱時間、插頭電壓、旅行收納尺寸</text>
  <text x="70" y="650" class="small">資料來源：Shopee 商品頁、官方/公開查核資料。實際價格與庫存以下單頁為準。</text>
</svg>
