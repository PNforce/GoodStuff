<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1350" viewBox="0 0 900 1350" role="img" aria-labelledby="title desc">
  <title id="title">店鋪與商品推薦內容縮圖</title>
  <desc id="desc">以店面櫥窗、商品卡片與推薦標籤構成的原創分類縮圖。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f8fbff"/><stop offset="1" stop-color="#e9f7ef"/></linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#f2f7f4"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#16324a" flood-opacity="0.18"/></filter>
  </defs>
  <rect width="900" height="1350" fill="url(#bg)"/>
  <circle cx="120" cy="180" r="160" fill="#b9e4d0" opacity="0.55"/>
  <circle cx="780" cy="1160" r="220" fill="#d6e7ff" opacity="0.7"/>
  <rect x="125" y="190" width="650" height="780" rx="44" fill="url(#card)" filter="url(#shadow)"/>
  <path d="M190 365 h520 l-48 -112 h-424z" fill="#23445e"/>
  <path d="M238 253 h424 l48 112 h-520z" fill="#3b8b6f" opacity="0.92"/>
  <rect x="210" y="365" width="480" height="420" rx="26" fill="#ffffff" stroke="#cfe1d8" stroke-width="8"/>
  <rect x="260" y="430" width="160" height="130" rx="22" fill="#e9f3ff"/>
  <rect x="480" y="430" width="160" height="130" rx="22" fill="#eef8ef"/>
  <rect x="260" y="610" width="380" height="40" rx="20" fill="#dfeae5"/>
  <rect x="260" y="680" width="300" height="40" rx="20" fill="#dfeae5"/>
  <path d="M292 498 l40 38 62 -82" fill="none" stroke="#2f7d63" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M510 488 h100 m-50 -50 v100" stroke="#2f7d63" stroke-width="18" stroke-linecap="round"/>
  <rect x="238" y="850" width="424" height="110" rx="55" fill="#17324d"/>
  <text x="450" y="920" text-anchor="middle" font-family="Noto Sans TC, Microsoft JhengHei, Arial, sans-serif" font-size="42" font-weight="800" fill="#ffffff">店鋪推薦</text>
  <text x="450" y="1090" text-anchor="middle" font-family="Noto Sans TC, Microsoft JhengHei, Arial, sans-serif" font-size="58" font-weight="800" fill="#17324d">店鋪與商品</text>
  <text x="450" y="1165" text-anchor="middle" font-family="Noto Sans TC, Microsoft JhengHei, Arial, sans-serif" font-size="58" font-weight="800" fill="#17324d">推薦內容</text>
</svg>
